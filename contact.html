<section class="container fade-in">
    <h1>Mes Services & Contact</h1>

    <div class="forms-wrapper">
        <div class="card form-card">
            <h3><i class="fas fa-envelope"></i> Me contacter</h3>
            <form id="contact-form">
                <input type="text" placeholder="Votre Nom" required>
                <input type="email" placeholder="Votre Email" required>
                <textarea placeholder="Votre Message" rows="4" required></textarea>
                <button type="submit">Envoyer le message</button>
            </form>
        </div>

        <div class="card form-card">
            <h3><i class="fas fa-file-signature"></i> Demande de projet</h3>
            <form id="demande-form">
                <input type="text" placeholder="Type de projet (Web, Réseau...)" required>
                <input type="text" placeholder="Budget estimé">
                <input type="date" title="Date de début souhaitée">
                <textarea placeholder="Détails du projet" rows="3"></textarea>
                <button type="submit">Soumettre la demande</button>
            </form>
        </div>

        <div class="card form-card">
            <h3><i class="fas fa-search"></i> Rechercher un projet</h3>
            <form id="recherche-form">
                <input type="text" placeholder="Mots-clés (ex: PHP, Cisco...)">
                <select>
                    <option value="">Toutes les catégories</option>
                    <option value="web">Développement Web</option>
                    <option value="reseau">Réseau & Sécurité</option>
                    <option value="linux">Administration Linux</option>
                </select>
                <button type="submit">Lancer la recherche</button>
            </form>
        </div>
    </div>
</section>
